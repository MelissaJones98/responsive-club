<!DOCTYPE html>
<html lang="en">
    <head>
        <title>TWBN: Join Us</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1"> 
        <link rel="icon" href="/images/crystal-ball-favicon.ico" type="icon">

        <!--stylesheets-->
        <link rel="stylesheet" href="/stylesheets/general.css">
        <link rel="stylesheet" href="/stylesheets/mobile.css">
        <link rel="stylesheet" href="/stylesheets/tablet.css">
        <link rel="stylesheet" href="/stylesheets/desktop.css">

        <!--fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Macondo&display=swap" rel="stylesheet">
    </head>
    <body>
        <header>
            <div class="header-banner">
                <img src="/images/book-left.png" alt="book logo" id="book-left">
                <div class="page-title">
                    <img src="/images/vines-top.png" alt="vine detailing above page title" class="vines-top">
                    <h1>The Witch's Book Nook</h1>
                    <img src="/images/vines-bottom.png" alt="vine detailing below page title" class="vines-bottom">
                </div>
                <img src="/images/book-right.png" alt="book logo" id="book-right">
            </div>

            <nav>
                <div class="nav-bar">
                    <ul>
                        <li class="btn"><a href="/pages/home.html">Home</a></li>
                        <li class="btn"><a href="/pages/about-us.html">About Us</a></li>
                        <li class="btn"><a href="/pages/books.html">Books</a></li>
                        <li class="btn"><a href="/pages/meet-ups.html">Meet Ups</a></li>
                        <li class="btn"><a href="/pages/join-us.html">Join Us</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main>
            <h2 class="heading">Join Us</h2>
            <section class="join-us-section">
                <h3 class="subheading">Please complete the form below to join our book club</h3>
                <form>
                    <span><label for="firstname" class="label">Firstname</label>
                    <input type="text" id="firstname" name="firstname" class="textbox"></span>
                    <br>
                    <span><label for="lastname" class="label">Lastname</label>
                    <input type="text" id="lastname" name="lastname" class="textbox"></span>
                    <br>
                    <span><label for="email" class="label">Email</label>
                    <input type="text" id="email" name="email" class="textbox"></span>
                    <br>
                    <span><label for="phone" class="label">Phone</label>
                    <input type="text" id="phone" name="phone" class="textbox"></span>
                    <br>
                    <label for="tell-us">Tell us about yourself, the last book you read, 
                        and why you want to join our book club
                    </label>
                    <input type="text" id="tell-us" name="tell-us">
                    <br>
                    <input type="submit" id="submit" class="btn">
                </form>
            </section>
        </main>

        <footer>
            <div class="footer-div">
                <p class="footer-content">The Witch's Book Nook</p>
                <p class="footer-content" id="email">contact-us@twbn.co.uk</p>
            </div>
        </footer>
    </body>
</html>
